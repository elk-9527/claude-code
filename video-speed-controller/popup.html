<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #fff;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 16px;
      text-align: center;
    }
    .speed-display {
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      color: #89b4fa;
      margin: 8px 0 16px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: #89b4fa;
    }
    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .presets button {
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      background: #313244;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .presets button:hover {
      background: #45475a;
    }
    .presets button.active {
      background: #89b4fa;
      color: #1e1e2e;
      font-weight: bold;
    }
    .hint {
      margin-top: 14px;
      font-size: 11px;
      color: #a6adc8;
      line-height: 1.5;
      text-align: center;
    }
    .toggle-bar {
      width: 100%;
      margin-top: 14px;
      padding: 9px 0;
      border: none;
      border-radius: 6px;
      background: #45475a;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .toggle-bar:hover {
      background: #585b70;
    }
  </style>
</head>
<body>
  <h3>🎬 视频速度控制</h3>
  <div class="speed-display" id="display">1.0x</div>
  <div class="slider-row">
    <span>0.1x</span>
    <input type="range" id="slider" min="0.1" max="32" step="0.1" value="1">
    <span>32x</span>
  </div>
  <div class="presets" id="presets"></div>
  <button id="toggleBar" class="toggle-bar">显示 / 隐藏 页面悬浮条</button>
  <div class="hint">
    快捷键: Shift + . 加速 / Shift + , 减速 / Shift + / 重置<br>
    悬浮条可拖动，鼠标移开自动半透明
  </div>
  <script src="popup.js"></script>
</body>
</html>
