<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>跨屏协同</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="titlebar">
    <div class="drag-region"></div>
    <div class="win-controls">
      <button id="btn-min" class="win-btn min" title="最小化"></button>
      <button id="btn-close" class="win-btn close" title="关闭"></button>
    </div>
  </div>

  <main class="app">
    <div class="hero">
      <div class="logo-ring" id="logoRing">
        <div class="logo-glyph">⇆</div>
      </div>
      <h1>跨屏协同</h1>
      <p class="subtitle" id="subtitle">用 USB 连接你的平板</p>
    </div>

    <section class="card" id="deviceCard">
      <div class="card-head">
        <span>USB 设备</span>
        <button class="ghost-btn" id="btn-refresh">刷新</button>
      </div>
      <div id="deviceList" class="device-list">
        <div class="empty">未检测到设备，请插上 USB 数据线</div>
      </div>
    </section>

    <section class="card status-card" id="statusCard" hidden>
      <div class="status-row">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">未连接</span>
        <span class="latency" id="latencyText"></span>
      </div>
      <div class="perm-hints" id="permHints"></div>
    </section>

    <div class="actions">
      <button class="primary-btn" id="btn-connect" disabled>连接</button>
      <button class="secondary-btn" id="btn-disconnect" hidden>断开</button>
    </div>

    <div class="cross-tip" id="crossTip" hidden>
      <div class="tip-inner">
        <strong>已连接</strong>
        <span>把鼠标移到屏幕<b>最右边缘</b>即可穿越到平板，或按 <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>→</kbd></span>
      </div>
    </div>
  </main>

  <script src="index.js"></script>
</body>
</html>
